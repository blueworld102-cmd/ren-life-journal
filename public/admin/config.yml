# Decap CMS — Ren's Life Journal
# 文件：https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  repo: blueworld102-cmd/ren-life-journal
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/feeda0a1-77ad-4e69-b2ba-cb98ec071558/pkce
  auth_token_endpoint: /sites/feeda0a1-77ad-4e69-b2ba-cb98ec071558/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://ren-life-journal.vercel.app

# 本地開發可用：npx decap-server（僅本機，不影響 production）
# local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

slug:
  encoding: unicode
  clean_accents: true

publish_mode: simple

collections:
  - name: articles
    label: 文章
    label_singular: 文章
    folder: src/content/articles
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 摘要, name: description, widget: text }
      - { label: 發布日期, name: pubDate, widget: datetime, date_format: 'YYYY-MM-DDTHH:mm:ss.SSSZ', time_format: false }
      - { label: 更新日期, name: updatedDate, widget: datetime, required: false, date_format: 'YYYY-MM-DDTHH:mm:ss.SSSZ', time_format: false }
      - { label: 草稿, name: draft, widget: boolean, default: true }
      - label: 分類
        name: category
        widget: select
        options:
          - 日本生活
          - 日本生活手續
          - 打工度假
          - 東京散步
          - 旅遊紀錄
          - 省錢生活
          - 工作與職涯
          - 心情筆記
      - { label: 標籤, name: tags, widget: list, default: [] }
      - { label: 地點, name: location, widget: string, required: false }
      - { label: 天氣, name: weather, widget: string, required: false }
      - { label: 心情, name: mood, widget: string, required: false }
      - { label: 閱讀時間, name: readingTime, widget: string, required: false, hint: '例：6 分鐘' }
      - { label: 封面, name: cover, widget: image, required: false, hint: '上傳後路徑如 /images/uploads/xxx.png；封面說明請寫在文章 description 或正文圖片 alt' }
      - { label: 封面位置, name: coverPosition, widget: string, default: center, required: false }
      - { label: 正文, name: body, widget: markdown, hint: '內文圖片可用 Markdown 插入，或先上傳到媒體庫再引用' }
